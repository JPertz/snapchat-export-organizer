name: Build Windows App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller
          npm install --prefix webui

      - name: Build frontend
        run: |
          npm run build --prefix webui

      - name: Build app
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name SnapchatExportOrganizer --collect-data snapchat_export_organizer --paths src src/snapchat_export_organizer/app.py

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SnapchatExportOrganizer/* -DestinationPath dist/SnapchatExportOrganizer-win64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapchatExportOrganizer-win64
          path: dist/SnapchatExportOrganizer-win64.zip

      - name: Attach asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SnapchatExportOrganizer-win64.zip
